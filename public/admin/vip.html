<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Dịch VIP - Admin AI Study Hub</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .table th { color: var(--text-secondary); font-weight: 500; font-size: 0.875rem; text-transform: uppercase; }
        .badge { padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .b-completed { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .b-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .b-failed { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <nav class="navbar" style="z-index: 100; border-bottom: 1px solid var(--secondary);">
        <div class="container navbar-container">
            <a href="/" class="nav-brand">Hệ Thống <span class="text-gradient">Quản Trị</span></a>
            <div id="user-menu" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li><a href="/admin/dashboard.html" class="sidebar-link">📈 Thống kê & Tổng quan</a></li>
                <li><a href="/admin/users.html" class="sidebar-link">👥 Quản lý Users</a></li>
                <li><a href="/admin/courses.html" class="sidebar-link">📚 Kiểm duyệt khóa học</a></li>
                <li><a href="/admin/vip.html" class="sidebar-link active">💎 Giao dịch VIP</a></li>
                <li><a href="/admin/logs.html" class="sidebar-link">📋 Audit Logs</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 style="font-size: 2rem;">💎 Lịch Sử Giao Dịch VIP</h1>
                    <p class="text-secondary mt-2">Giám sát doanh thu và các lượt nâng cấp tài khoản Premium theo thời gian thực.</p>
                </div>
            </div>

            <!-- VIP Payments -->
            <div class="card glass-panel" style="padding: 1.5rem; border-color: rgba(99, 102, 241, 0.2);" id="vip">
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>MÃ GD</th>
                                <th>HỌC VIÊN</th>
                                <th>SỐ TIỀN</th>
                                <th>THỜI GIAN</th>
                                <th>TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="vip-table">
                            <tr><td colspan="5" style="text-align: center; padding: 2rem;">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </main>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = App.requireAuth(['admin']);
            if (!user) return;
            await loadVipPayments();
        });

        async function loadVipPayments() {
            try {
                const res = await window.api.get('/admin/vip-payments');
                const tbody = document.getElementById('vip-table');
                if(!res.data || res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-secondary);">Chưa có giao dịch VIP nào phát sinh.</td></tr>';
                    return;
                }

                tbody.innerHTML = res.data.map(p => {
                    let badge = '';
                    if(p.status === 'completed') badge = '<span class="badge b-completed">✅ Thành công</span>';
                    else if(p.status === 'pending') badge = '<span class="badge b-pending">⏳ Chờ xử lý</span>';
                    else badge = '<span class="badge b-failed">❌ Thất bại</span>';

                    const dateObj = new Date(p.created_at);
                    const timeStr = dateObj.toLocaleTimeString('vi-VN') + ' ' + dateObj.toLocaleDateString('vi-VN');

                    return `
                    <tr>
                        <td style="color: var(--text-secondary); font-family: monospace;">#TXN_${p.id}</td>
                        <td>
                            <div style="font-weight: 500;">${p.email}</div>
                            <div style="font-size: 0.8rem; color:var(--text-secondary);">${p.username}</div>
                        </td>
                        <td style="color:var(--warning); font-weight:bold;">${new Intl.NumberFormat('vi-VN', {style: 'currency', currency: 'VND'}).format(p.amount)}</td>
                        <td style="font-size: 0.85rem; color: var(--text-secondary);">${timeStr}</td>
                        <td>${badge}</td>
                    </tr>
                `}).join('');
            } catch(e) {
                console.error("Lỗi tải giao dịch", e);
                App.showToast("Không thể lấy log giao dịch.", "error");
            }
        }
    </script>
</body>
</html>
