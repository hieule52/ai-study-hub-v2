<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - AI Study Hub</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="card glass-panel auth-card">
            <div class="text-center mb-8">
                <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Đăng Ký Học Viên</h2>
                <p class="text-secondary">AI Study Hub LMS Platform</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Tên hiển thị</label>
                    <input type="text" id="username" class="form-control" placeholder="Nguyen Van A" required minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="nguyenvana@gmail.com" required>
                </div>

                <div class="form-group mb-8">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Ít nhất 6 ký tự" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">
                    Tạo Tài Khoản Đi Lên VIP
                </button>
            </form>

            <div class="text-center mt-8">
                <p class="text-secondary">Đã có tài khoản? <a href="/login.html" class="text-gradient" style="font-weight: 600; text-decoration: none;">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Hệ thống đang lưu...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Route '/auth/register' created earlier in the PHP Core
                const res = await window.api.post('/auth/register', { 
                    username, email, password, role: 'student' 
                });
                
                App.showToast('Tạo tài khoản thành công! Đang tự đăng nhập...', 'success');
                
                // Trực tiếp Login lấy Token
                const loginRes = await window.api.post('/auth/login', { email, password });
                window.api.setToken(loginRes.data.access_token, loginRes.data.user);

                setTimeout(() => {
                    window.location.href = '/student/dashboard.html';
                }, 1500);

            } catch (error) {
                App.showToast(error.message, 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
