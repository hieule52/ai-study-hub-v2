<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - AI Study Hub</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 3rem auto;
            display: grid;
            gap: 2rem;
            padding: 0 1rem;
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .premium-input {
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 10px !important;
            padding: 0.85rem 1rem !important;
            color: #fff !important;
            transition: all 0.3s ease !important;
        }
        
        .premium-input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
        }

        .premium-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-label {
            font-size: 0.85rem; color: #a0aec0; margin-bottom: 0.5rem; display: block;
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            margin-bottom: 1rem;
        }
        .back-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <nav class="navbar" style="z-index: 100; border-bottom: 1px solid var(--secondary);">
        <div class="container navbar-container">
            <a href="/" class="nav-brand">AI Study <span class="text-gradient">Hub</span></a>
            <div id="user-menu" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <div class="profile-container">
        
        <div>
            <a href="javascript:window.history.back()" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
                Trở về trang trước
            </a>
            <h1>👤 Cài đặt Tài khoản</h1>
            <p class="text-secondary">Quản lý định danh và cài đặt bảo mật gốc.</p>
        </div>

        <!-- Identity Section -->
        <div class="card glass-panel avatar-section">
            <div style="position: relative; cursor: pointer;" onclick="document.getElementById('avatarUpload').click()" title="Nhấn để đổi Ảnh Đại Diện">
                <div class="avatar-circle" id="user-avatar-char" style="overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <span id="avatar-letter">?</span>
                </div>
                <div style="position: absolute; bottom: -5px; right: -5px; background: var(--primary); padding: 5px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
            </div>
            <input type="file" id="avatarUpload" style="display:none;" accept="image/png, image/jpeg, image/webp" onchange="handleAvatarUpload(event)">
            
            <div>
                <h3 style="margin-bottom: 0.2rem;" id="ui-username">...</h3>
                <div style="color: var(--text-secondary); font-size: 0.9rem;" id="ui-email">...</div>
                <div style="margin-top: 0.5rem;">
                    <span id="ui-role" style="font-size: 0.75rem; padding: 0.2rem 0.6rem; background: rgba(99,102,241,0.2); color: var(--primary); border-radius: 12px; font-weight: bold;">ROLE</span>
                </div>
            </div>
        </div>

        <!-- Update Info Form -->
        <div class="card glass-panel" style="padding: 2rem;">
            <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--primary);"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Thông tin Cá nhân
            </h3>
            
            <form id="profileForm" onsubmit="updateProfile(event)">
                <div class="form-group mb-4">
                    <label class="form-label">Email (Định danh không thể thay đổi)</label>
                    <input type="email" id="email" class="form-control premium-input" disabled>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label">Tên hiển thị</label>
                    <input type="text" id="username" class="form-control premium-input" required placeholder="Nhập tên mới...">
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="btn btn-primary btn-gradient" id="btnSaveInfo">💾 Lưu Tên Tương Tác</button>
                </div>
            </form>
        </div>

        <!-- Change Password Form -->
        <div class="card glass-panel" style="padding: 2rem; border-color: rgba(239, 68, 68, 0.2);">
            <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--danger);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Bảo mật Đăng nhập
            </h3>
            
            <form id="passwordForm" onsubmit="changePassword(event)">
                <div class="form-group mb-4">
                    <label class="form-label">Mật khẩu Hiện tại</label>
                    <input type="password" id="old_password" class="form-control premium-input" required placeholder="Nhập mật khẩu đang sử dụng...">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label class="form-label">Mật khẩu Mới</label>
                        <input type="password" id="new_password" class="form-control premium-input" required minlength="6" placeholder="Mật khẩu mới...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Xác nhận Mật khẩu Mới</label>
                        <input type="password" id="confirm_password" class="form-control premium-input" required minlength="6" placeholder="Nhập lại mật khẩu...">
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="btn btn-outline" style="border-color: var(--danger); color: var(--danger);" id="btnSavePass">🔐 Đổi Mật Khẩu</button>
                </div>
            </form>
        </div>

    </div>

    <!-- Cần load axios/api handling -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = App.requireAuth(); // Require any logged in role
            if (!user) return;
            
            await fetchProfile();
        });

        async function fetchProfile() {
            try {
                const res = await window.api.get('/user/profile');
                const user = res.data;
                
                // Binding View
                document.getElementById('email').value = user.email;
                document.getElementById('username').value = user.username;
                
                // Avatar Area binding
                document.getElementById('ui-username').innerText = user.username;
                document.getElementById('ui-email').innerText = user.email;
                document.getElementById('ui-role').innerText = user.role.toUpperCase();
                
                const avatarCircle = document.getElementById('user-avatar-char');
                if (user.avatar) {
                    avatarCircle.innerHTML = `<img src="${user.avatar}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else {
                    avatarCircle.innerHTML = `<span id="avatar-letter">${user.username.charAt(0).toUpperCase()}</span>`;
                }

            } catch(e) {
                App.showToast("Không thể tải thông tin user: " + e.message, "error");
            }
        }

        async function updateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveInfo');
            btn.disabled = true;
            btn.innerText = "⏳ Đang lưu...";

            try {
                const username = document.getElementById('username').value;
                await window.api.put('/user/profile', { username });
                
                App.showToast("Cập nhật thông tin thành công!", "success");
                
                // Cập nhật lại UI Avatar
                document.getElementById('ui-username').innerText = username;
                
                // Nếu chưa có ảnh thì đổi logo chữ cái
                const avatarLetter = document.getElementById('avatar-letter');
                if(avatarLetter) avatarLetter.innerText = username.charAt(0).toUpperCase();

                // Cập nhật Local Storage object (để navbar không bị cũ)
                const currSession = JSON.parse(localStorage.getItem('auth_user'));
                if(currSession) {
                    currSession.username = username;
                    localStorage.setItem('auth_user', JSON.stringify(currSession));
                    App.renderUserNav(); // Update Right corner
                }

            } catch(e) {
                App.showToast(e.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "💾 Lưu Tên Tương Tác";
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            
            const oldPass = document.getElementById('old_password').value;
            const newPass = document.getElementById('new_password').value;
            const confPass = document.getElementById('confirm_password').value;

            if (newPass !== confPass) {
                return App.showToast("Mật khẩu xác nhận không khớp!", "error");
            }

            const btn = document.getElementById('btnSavePass');
            btn.disabled = true;
            btn.innerText = "⏳ Đang đổi...";

            try {
                await window.api.put('/user/change-password', {
                    old_password: oldPass,
                    new_password: newPass
                });
                
                App.showToast("Thay đổi mật khẩu thành công!", "success");
                
                // Reset form
                document.getElementById('passwordForm').reset();
                
            } catch(e) {
                App.showToast(e.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "🔐 Đổi Mật Khẩu";
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Kiểm tra sơ bộ ở Frontend (2MB) để tiết kiệm băng thông gửi lên
            if (file.size > 2 * 1024 * 1024) {
                App.showToast("Dung lượng ảnh vượt quá 2MB, vui lòng chọn ảnh khác.", "error");
                event.target.value = ''; // Reset input
                return;
            }

            App.showToast("Đang tải ảnh lên...", "success");

            try {
                // Tạo FromData multipart
                const formData = new FormData();
                formData.append('avatar', file);

                // Api utility không bọc header content-type cho FormData để trình duyệt tự nhận dạng Boundary
                const token = window.api.getToken();
                
                const response = await fetch(`${window.api.baseUrl}/user/avatar`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Lỗi khi upload ảnh.');
                }

                const newAvatarUrl = data.data.avatar;
                
                // Cập nhật UI Profile ngay lập tức
                document.getElementById('user-avatar-char').innerHTML = `<img src="${newAvatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">`;
                
                // Cập nhật LocalStorage
                const currSession = JSON.parse(localStorage.getItem('auth_user'));
                if (currSession) {
                    currSession.avatar = newAvatarUrl;
                    localStorage.setItem('auth_user', JSON.stringify(currSession));
                    App.renderUserNav(); // Cập nhật hình nhỏ góc phải
                }

                App.showToast("Đổi ảnh đại diện thành công!", "success");

            } catch (err) {
                App.showToast(err.message, "error");
            } finally {
                event.target.value = ''; // Reset form reset để up 2 lần 1 file không bị khựng
            }
        }
    </script>
</body>
</html>
