<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Học Tập - Dashboard</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <!-- Header Overlay -->
    <nav class="navbar" style="z-index: 100;">
        <div class="container navbar-container">
            <a href="/" class="nav-brand">AI <span class="text-gradient">Study Hub</span></a>
            <div id="user-menu" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <div class="dashboard-layout" style="display: block; width: 100%; max-width: 1200px; margin: 0 auto; padding-top: 2rem;">
        <!-- Main Content -->
        <main class="main-content" style="padding-left: 2rem;">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 style="font-size: 2rem;">Chào mừng quay lại, <span id="student-name" class="text-gradient">...</span> 👋</h1>
                    <p class="text-secondary mt-2">Hôm nay bạn muốn học thêm điều gì mới?</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid-cols-3 mb-8">
                <div class="card p-4">
                    <p class="text-secondary" style="font-size: 0.875rem;">Đang học</p>
                    <h2 style="font-size: 2rem; color: var(--text-primary); margin-top: 0.5rem;" id="stat_learning">0 <span style="font-size: 1rem; font-weight: normal; color: var(--text-muted);">khóa</span></h2>
                </div>
                <div class="card p-4">
                    <p class="text-secondary" style="font-size: 0.875rem;">Hoàn thành</p>
                    <h2 style="font-size: 2rem; color: var(--success); margin-top: 0.5rem;" id="stat_completed">0 <span style="font-size: 1rem; font-weight: normal; color: var(--text-muted);">khóa</span></h2>
                </div>
                <div class="card p-4">
                    <p class="text-secondary" style="font-size: 0.875rem;">Chứng chỉ</p>
                    <h2 style="font-size: 2rem; color: var(--warning); margin-top: 0.5rem;" id="stat_certs">0</h2>
                </div>
            </div>

            <!-- My Courses -->
            <h3 class="mb-4" id="my-courses">Khóa Học Đang Tham Gia</h3>
            <div class="grid-cols-2" id="course-container">
                <div class="text-secondary col-span-2">Đang tải cấu trúc khóa học...</div>
            </div>
        </main>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check bảo vệ Route
            const user = App.requireAuth(['student', 'admin', 'teacher']);
            if (user) {
                document.getElementById('student-name').innerText = user.username || user.email.split('@')[0];
                
                const promoBox = document.getElementById('vip-promo-box');
                if (promoBox && (user.is_vip == 0 || !user.is_vip)) {
                    promoBox.style.display = 'block';
                }
                
                await loadDashboardData();
            }

            async function loadDashboardData() {
                try {
                    const res = await window.api.get('/student/courses');
                    const courses = res.data || [];
                    
                    let completed = 0;
                    let learning = 0;
                    
                    const container = document.getElementById('course-container');
                    container.innerHTML = '';
                    
                    if (courses.length === 0) {
                        container.innerHTML = '<div class="card p-4 col-span-2 text-center text-secondary">Bạn chưa tham gia khóa học nào. <a href="/" class="text-gradient">Khám phá ngay</a></div>';
                    } else {
                        courses.forEach(c => {
                            let prog = parseInt(c.progress_percent) || 0;
                            if (prog >= 100) completed++;
                            else learning++;
                            
                            const div = document.createElement('div');
                            div.className = 'card glass-panel';
                            div.style.cssText = 'padding: 1.5rem; display: flex; gap: 1.5rem; align-items: center;';
                            // Sử dụng thumbnail hoặc icon mặc định
                            const icon = c.thumbnail ? `<img src="${c.thumbnail}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);">` : '🚀';
                            div.innerHTML = `
                                <div style="width: 120px; height: 100px; border-radius: var(--radius-md); background: #334155; display: flex; align-items: center; justify-content: center; font-size: 2rem;">${icon}</div>
                                <div style="flex: 1;">
                                    <h4 style="margin-bottom: 0.5rem;">${c.title}</h4>
                                    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 0.5rem;">
                                        <div style="width: ${prog}%; height: 100%; background: var(--primary); border-radius: 4px;"></div>
                                    </div>
                                    <p class="text-secondary" style="font-size: 0.75rem;">Đã hoàn thành ${prog}%</p>
                                    <a href="/student/learning.html?course_id=${c.id}" class="btn btn-outline mt-4" style="padding: 0.5rem 1rem;">Tiếp tục học</a>
                                </div>
                            `;
                            container.appendChild(div);
                        });
                    }
                    
                    document.getElementById('stat_learning').innerHTML = `${learning} <span style="font-size: 1rem; font-weight: normal; color: var(--text-muted);">khóa</span>`;
                    document.getElementById('stat_completed').innerHTML = `${completed} <span style="font-size: 1rem; font-weight: normal; color: var(--text-muted);">khóa</span>`;
                    document.getElementById('stat_certs').innerText = completed;

                } catch (error) {
                    document.getElementById('course-container').innerHTML = '<div class="text-danger">Lỗi nạp dữ liệu: ' + error.message + '</div>';
                }
            }

            document.getElementById('btn-upgrade-vip')?.addEventListener('click', async () => {
                try {
                    const btn = document.getElementById('btn-upgrade-vip');
                    btn.innerHTML = 'Đang xử lý...';
                    btn.disabled = true;

                    // 1. Tạo yêu cầu thanh toán
                    const paymentRes = await window.api.post('/vip/create-payment', {});
                    const txnId = paymentRes.data.transaction_id;

                    App.showToast('Đang chuyển hướng thanh toán...', 'info');

                    // 2. Giả lập Bank Webhook báo thành công sau 2 giây
                    setTimeout(async () => {
                        try {
                            await window.api.put(`/vip/mock-success/${txnId}`, {});
                            App.showToast('Nâng cấp VIP thành công! Xin chúc mừng.', 'success');
                            
                            // Cập nhật local storage cho is_vip
                            const userData = JSON.parse(localStorage.getItem('user'));
                            userData.is_vip = 1;
                            localStorage.setItem('user', JSON.stringify(userData));

                            setTimeout(() => {
                                window.location.reload();
                            }, 1500);
                        } catch (err) {
                            App.showToast(err.message, 'error');
                            btn.innerHTML = 'Nâng cấp ngay';
                            btn.disabled = false;
                        }
                    }, 2000);

                } catch (error) {
                    App.showToast(error.message, 'error');
                    document.getElementById('btn-upgrade-vip').innerHTML = 'Nâng cấp ngay';
                    document.getElementById('btn-upgrade-vip').disabled = false;
                }
            });
        });
    </script>
</body>
</html>
